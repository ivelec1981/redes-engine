# ─────────────────────────────────────────────────────────────────────────────
# Render.com deployment (Blueprint v2)
# https://render.com/docs/blueprint-spec
#
# Deploy en 2 pasos:
#   1. Push del repo a GitHub
#   2. Render dashboard → "New" → "Blueprint" → conecta el repo
#   → Render lee este archivo y crea el servicio automáticamente.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: redes-engine
    runtime: docker
    repo: https://github.com/your-org/redes-engine
    plan: free                 # cambia a 'starter' o superior para producción
    region: oregon              # más cercano a Latinoamérica (Render no tiene SA)
    dockerfilePath: ./Dockerfile

    healthCheckPath: /api/v1/health

    envVars:
      - key: REDES_ENGINE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "8000"

    autoDeploy: true            # auto-deploy en cada push a main
