# ─────────────────────────────────────────────────────────────────────────────
# Fly.io deployment configuration
# https://fly.io/docs/reference/configuration/
#
# Deploy en 3 pasos:
#   1. fly auth login
#   2. fly launch --no-deploy   (genera app, NO modifica este archivo)
#   3. fly deploy               →  obtienes URL pública en *.fly.dev
# ─────────────────────────────────────────────────────────────────────────────

app = "redes-engine"
primary_region = "scl"   # Santiago de Chile (más cercano a Ecuador)

[build]
  dockerfile = "Dockerfile"

[env]
  REDES_ENGINE_ENV = "production"
  LOG_LEVEL = "info"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # cero costo cuando no hay tráfico
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/v1/health"

# Recursos del VM (default razonable para demo)
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Volumen persistente para .rsproj (opcional)
# [[mounts]]
#   source = "redes_data"
#   destination = "/data"
