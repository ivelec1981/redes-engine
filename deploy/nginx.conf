# ─────────────────────────────────────────────────────────────────────────────
# nginx reverse proxy → uvicorn (redes_engine API)
# ─────────────────────────────────────────────────────────────────────────────

upstream redes_engine_backend {
    server api:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Para producción real: redirigir a HTTPS
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;       # uploads .rsproj/.geojson

    location / {
        proxy_pass http://redes_engine_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts generosos (análisis 8760h puede tardar)
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /api/v1/health {
        proxy_pass http://redes_engine_backend;
        access_log off;
    }
}

